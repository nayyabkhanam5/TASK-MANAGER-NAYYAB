<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Kanban Task Manager</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/animations.css">

    <!-- Theme applied before page renders (no flash) -->
    <script src="js/theme-init.js"></script>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>
            <i class="fa fa-columns"></i>
            Kanban Task Manager
        </h1>
        <button id="themeBtn">Dark Mode</button>
    </header>

    <!-- Statistics Bar -->
    <section class="stats">
        <div id="totalTasks">Total Tasks: 0</div>
        <div id="inProgressTasks">In Progress: 0</div>
        <div id="completedTasks">Completed: 0</div>
        <div id="overdueTasks">Overdue: 0</div>
        <div id="completionRate">Completion: 0%</div>
        <progress id="completionBar"
            value="0" max="100">
        </progress>
    </section>

    <!-- Controls -->
    <section class="controls">

        <input type="text"
            id="searchInput"
            placeholder="🔍 Search tasks...">

        <select id="priorityFilter">
            <option value="all">All Priorities</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
        </select>

        <select id="sortTasks">
            <option value="created">Date Created</option>
            <option value="dueDate">Due Date</option>
            <option value="priority">Priority</option>
        </select>

        <button id="clearFilters">
            <i class="fa fa-times"></i> Clear Filters
        </button>

        <button id="addTaskBtn">
            <i class="fa fa-plus"></i> Add Task
        </button>

        <button id="exportBtn">
            <i class="fa fa-file-csv"></i> Export CSV
        </button>

        <button id="exportJsonBtn">
            <i class="fa fa-file-code"></i> Export JSON
        </button>

    </section>

    <!-- Mobile Tabs (shown only on mobile) -->
    <div class="mobile-tabs">
        <button class="tab-btn active"
            onclick="showTab('todo')">
            To Do
        </button>
        <button class="tab-btn"
            onclick="showTab('progress')">
            In Progress
        </button>
        <button class="tab-btn"
            onclick="showTab('done')">
            Done
        </button>
    </div>

    <!-- Board -->
    <section class="board">

        <div class="column" id="col-todo">
            <h2>To Do
                <span id="todoCount">0</span>
            </h2>
            <div id="todoTasks"></div>
        </div>

        <div class="column" id="col-progress">
            <h2>In Progress
                <span id="progressCount">0</span>
            </h2>
            <div id="progressTasks"></div>
        </div>

        <div class="column" id="col-done">
            <h2>Done
                <span id="doneCount">0</span>
            </h2>
            <div id="doneTasks"></div>
        </div>

    </section>

    <!-- Add / Edit Task Modal -->
    <div class="modal" id="taskModal">
        <form class="task-form" id="taskForm">

            <h2>Add New Task</h2>

            <input type="text"
                id="taskTitle"
                placeholder="Task Title (required)">
            <div id="titleError"
                class="error-message"></div>

            <textarea id="taskDescription"
                placeholder="Description (optional)"
                rows="3"></textarea>

            <select id="taskPriority">
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>

            <select id="taskStatus">
                <option value="todo">To Do</option>
                <option value="progress">
                    In Progress
                </option>
                <option value="done">Done</option>
            </select>

            <input type="date" id="taskDate">
            <div id="dateError"
                class="error-message"></div>

            <!-- Tag input -->
            <input type="text"
                id="taskTags"
                placeholder="Add tag then press Enter">

            <!-- Tag pills appear here -->
            <div id="tagPillsContainer"
                class="tags-container"></div>

            <button type="submit">
                <i class="fa fa-save"></i>
                Save Task
            </button>

            <button type="button" id="closeModal">
                <i class="fa fa-times"></i>
                Cancel
            </button>

        </form>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="task-form delete-confirm">

            <h2>Delete Task</h2>
            <p>Are you sure you want to
               delete this task?</p>

            <div class="delete-actions">
                <button type="button"
                    id="cancelDelete">
                    Cancel
                </button>
                <button type="button"
                    id="confirmDelete"
                    class="btn-danger">
                    Delete
                </button>
            </div>

        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast"></div>

    <!-- Scripts (order matters!) -->
    <script src="js/storage.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/board.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/tab.js"></script>  
    <script src="js/app.js"></script>

</body>
</html>
